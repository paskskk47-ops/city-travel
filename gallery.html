<!DOCTYPE html>

<head>

  <title>Gallery | Choose Travel – Explore Our Travel Photos</title>
  <meta name="description" content="Browse stunning photos from our tour packages and destinations across India. Kerala, Goa, Rajasthan, Andaman and more!">
  <link rel="canonical" href="https://www.choose.travel/gallery/" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "ImageGallery",
        "@id": "https://www.choose.travel/gallery/#webpage",
        "url": "https://www.choose.travel/gallery/",
        "name": "Choose Travel Photo Gallery – India Tour Packages & Destinations",
        "description": "Explore high-resolution photographs of Kerala backwaters, Munnar tea estates, Kashmir snow valleys, Goa beaches, and Himachal mountains.",
        "isPartOf": {
          "@type": "TravelAgency",
          "@id": "https://www.choose.travel/#organization",
          "name": "Choose Travel"
        }
      }
    ]
  }
  </script>
  <style>
    .gallery-masonry {
      columns: 4;
      column-gap: 14px;
    }
    .gallery-masonry .gallery-item {
      break-inside: avoid;
      margin-bottom: 14px;
      aspect-ratio: auto;
      grid-row: auto;
    }
    .gallery-masonry .gallery-item img { height: auto; }
    @media (max-width: 900px) { .gallery-masonry { columns: 3; } }
    @media (max-width: 600px) { .gallery-masonry { columns: 2; } }
  </style>
</head>
